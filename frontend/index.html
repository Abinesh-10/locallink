<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C9682F" />

    <title>LocalLink — Your neighborhood, connected</title>
    <meta
      name="description"
      content="Hire trusted local workers, rent and sell nearby, get community help fast — all in your neighborhood."
    />

    <!-- Open Graph (Facebook, WhatsApp link previews — important in the
         Indian market where WhatsApp sharing is a primary distribution channel) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LocalLink — Your neighborhood, connected" />
    <meta
      property="og:description"
      content="Hire trusted local workers, rent and sell nearby, get community help fast — all in your neighborhood."
    />
    <meta property="og:site_name" content="LocalLink" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:locale:alternate" content="ta_IN" />
    <meta property="og:locale:alternate" content="hi_IN" />
    <meta property="og:locale:alternate" content="te_IN" />
    <meta property="og:locale:alternate" content="ml_IN" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LocalLink — Your neighborhood, connected" />
    <meta
      name="twitter:description"
      content="Hire trusted local workers, rent and sell nearby, get community help fast."
    />

    <!-- Mobile web-app capable (this is a mobile-first PWA-style app) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LocalLink" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      SEO caveat (honest): this is a client-rendered Vite SPA, not SSR.
      Crawlers that don't execute JS will only see this static shell, not
      page-specific content (a worker's profile, a listing, etc.). The OG
      tags above are static and apply to the site as a whole — they do NOT
      change per-route, because there's no server rendering route-specific
      meta. For true per-page SEO (e.g. individual listings ranking in
      search, rich per-listing link previews), this would need migrating to
      Next.js or adding a prerender/SSR layer — out of scope for the current
      build, flagged here so it's not mistaken for a complete SEO solution.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
